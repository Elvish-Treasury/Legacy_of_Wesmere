#textdomain wesnoth-low
[unit_type]
    id=Elvish Enchanted Warrior
    name= _ "Elvish Enchanted Warrior"
    race=elf
    image="units/enchanted_warrior.png"
    hitpoints=61
    movement_type=woodland
    movement=6
    experience=200
    level=4
    alignment=neutral
    advances_to=null
    {AMLA_DEFAULT}
    cost=100
    usage=mixed fighted
    description= _ "Few elves are willing to imbue themselves with soul-destroying magic in order to gain incredible power. But those who have done so become living weapons, unrivaled masters of fencing and archery. Their incredible speed and accuracy shock even their allies. They all meet their end on the battlefield and become grim legends among their people..."
    die_sound={SOUND_LIST:ELF_HIT}

    {DEFENSE_ANIM "units/enchanted_warrior.png" "units/enchanted_warrior.png" {SOUND_LIST:ELF_HIT}}

    [attack]
        name=sword
        description=_"sword"
        icon=attacks/sword-elven.png
        type=blade
        range=melee
        damage=7
        number=5
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-elven.png
        type=pierce
        range=ranged
        damage=9
        number=6
    [/attack]

    [attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/missile-n.png"
            image_diagonal="projectiles/missile-ne.png"
        [/missile_frame]
        start_time=-445
        [frame]
            image="units/enchanted_warrior.png:100"
        [/frame]
        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        start_time=-200
        [frame]
            image="units/enchanted_warrior.png:300"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -75}
    [/attack_anim]
[/unit_type]

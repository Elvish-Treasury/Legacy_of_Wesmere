#textdomain wesnoth-low
[scenario]
    id=22_Costly_Revenge
    next_scenario=23_Council_Ruling
    name= _ "Costly Revenge"
    {LOW_MAP 21_Costly_Revenge.map}
    {~add-ons/Legacy_of_Wesmere/maps/Saurgath_utils.cfg}
    victory_when_enemies_defeated=no
    experience_modifier=100
    carryover_percentage=40
    carryover_add=yes
    {DEFAULT_SCHEDULE_AFTERNOON}
    {TURNS 40 37 34}

    {INTRO_AND_SCENARIO_MUSIC revelation.ogg the_deep_path.ogg}
    {EXTRA_SCENARIO_MUSIC                         vengeful.ogg}
    {EXTRA_SCENARIO_MUSIC                casualties_of_war.ogg}
    {EXTRA_SCENARIO_MUSIC           the_dangerous_symphony.ogg}
    {EXTRA_SCENARIO_MUSIC                 into_the_shadows.ogg}
    {EXTRA_SCENARIO_MUSIC                weight_of_revenge.ogg}
    {EXTRA_SCENARIO_MUSIC                    nunc_dimittis.ogg}
    {EXTRA_SCENARIO_MUSIC                         suspense.ogg}

    [story]
        [part]
            show_title=yes
            story= _ "But Kalenz failed to persuade his comrades. Olurf left, and Landar insisted the elves must march on the empire of the saurians..."
            {LOW_BIGMAP}
        [/part]
        [part]
            story={CAPTION ( _ "Cleodil")} + _ "Kalenz... the shydes and druids are not happy with this. The saurians are already beaten, and there is too much hate in Landar’s heart. Something is not right here."
            background=story/characters/cleodil.webp
            scale_background=no
        [/part]
        [part]
            story={CAPTION ( _ "Kalenz")} + _ "I am not entirely easy with this myself, Cleodil. But there is something to what Landar says; the wide green world must know there is a price, a heavy price for the death and suffering inflicted upon the elvish people."
            background=story/characters/kalenz.webp
            scale_background=no
        [/part]
        [part]
            story={CAPTION ( _ "Cleodil")} + _ "Then you who walk the earth path and carry steel can collect that price. Those on the faerie path will not be with you. Not this time."
            background=story/characters/cleodil.webp
            scale_background=no
        [/part]
        [part]
            story={CAPTION ( _ "Kalenz")} + _ "We do as we must."
            background=story/characters/kalenz.webp
            scale_background=no
        [/part]
    [/story]

    {LOW_TRACK {SCENARIO_21} }

    [side]
        side=1
        {SIDE_1_ESSENTIALS}
        {KALENZ_LORD}
        {SIDE_1_GOLD_FIXED 300 200}
        income=-2
        village_gold=1
        fog=no
        shroud=no
        [unit]
            {CLEODIL_COMPANION}
            placement=leader
        [/unit]
        [unit]
            {GALTRID_COMPANION}
            placement=leader
        [/unit]
#ifndef MULTIPLAYER
        [unit]
            {LANDAR}
            location_id=2
        [/unit]
        [unit]
            {ERADION_COMPANION}
            placement=leader
        [/unit]
#endif
    [/side]

    [side]
        side=2
        {SIDE_2_ESSENTIALS}
        {LANDAR}
        gold=200
        income=-2
        village_gold=1
        fog=no
        shroud=no
#ifdef MULTIPLAYER
        [unit]
            {ERADION_COMPANION}
            placement=leader
        [/unit]
#endif
    [/side]

    {STARTING_VILLAGES 3 7}

    [side]
        side=3
        {UNPLAYABLE_SIDE}
        team_name=saurians
        user_team_name= _ "Lizards"
        {FLAG_VARIANT undead}
        type=Saurian Flanker
        id=Fayl
        name=_ "Fayl"
        {GOLD 180 240 280}
        {INCOME 4 8 12}
#ifdef EASY
        recruit=Saurian Skirmisher, Saurian Augur
#else
        recruit=Saurian Skirmisher, Saurian Augur, Saurian Ambusher, Saurian Oracle, Saurian Soothsayer, Saurian Flanker, LoW Saurian Impaler, LoW Saurian Pikebearer
#endif
        [ai]
            passive_leader=yes
#ifdef EASY
            recruitment_pattern=scout,scout,healer,scout
#else
            recruitment_pattern=scout,scout,healer,archer,archer,fighter,scout
#endif
        [/ai]
    [/side]

    {STARTING_VILLAGES 4 6}

    [side]
        side=4
        {UNPLAYABLE_SIDE}
        team_name=saurians
        user_team_name= _ "Lizards"
        {FLAG_VARIANT undead}
        type=Saurian Flanker
        id=An-Meez
        name=_ "An-Meez"
        {GOLD 180 240 280}
        {INCOME 4 8 12}
#ifdef EASY
        recruit=Saurian Skirmisher, Saurian Augur
#else
        recruit=Saurian Skirmisher, Saurian Augur, Saurian Ambusher, Saurian Oracle, Saurian Soothsayer, Saurian Flanker, LoW Saurian Impaler, LoW Saurian Pikebearer
#endif
        [ai]
            passive_leader=yes
#ifdef EASY
            recruitment_pattern=scout,scout,healer,scout
#else
            recruitment_pattern=scout,scout,healer,archer,archer,fighter,scout
#endif
        [/ai]
    [/side]

    {STARTING_VILLAGES 5 9}

    [side]
        side=5
        {UNPLAYABLE_SIDE}
        team_name=saurians
        user_team_name= _ "Lizards"
        {FLAG_VARIANT undead}
        type=Saurian Flanker
        id=Inair
        name= _ "Inair"
        {GOLD 180 240 280}
        {INCOME 4 8 12}
#ifdef EASY
        recruit=Saurian Skirmisher, Saurian Augur
#else
        recruit=Saurian Skirmisher, Saurian Augur, Saurian Ambusher, Saurian Flanker, LoW Saurian Impaler, LoW Saurian Pikebearer
#endif
        [ai]
            passive_leader=yes
#ifdef EASY
            recruitment_pattern=scout,scout,healer,scout
#else
            recruitment_pattern=scout,scout,healer,archer,archer,fighter,scout
#endif
        [/ai]
    [/side]

    [event]
        name=prestart

        {NEED_KALENZ_LORD}

        {MODIFY_UNIT side=1,2 facing se}
        {MODIFY_UNIT side=3 facing sw}
        {MODIFY_UNIT side=4,5 facing nw}

        [store_unit]
            [filter]
                id=Cleodil
            [/filter]
            kill=yes
            variable=cleodil
        [/store_unit]

        [store_unit]
            [filter]
                side=1,2
                type_adv_tree=Elvish Shaman,Wose
            [/filter]
            kill=yes
            variable=shamans
        [/store_unit]

        [disallow_recruit]
            side=1,2
            type=Elvish Shaman,Wose
        [/disallow_recruit]

        [store_unit]
            [filter]
                id=Olurf
            [/filter]
            kill=yes
            variable=olurf_stored
        [/store_unit]

        [objectives]
            side=0
            [objective]
                description= _ "Defeat all enemy units, and capture all villages"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Kalenz"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Landar"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Eradion"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Galtrid"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                carryover_percentage=40
                bonus=yes
            [/gold_carryover]
        [/objectives]
    [/event]

    [event]
    name=saurians_left
        [message]
            speaker=Landar 
            message= _ "The villages are ours! Now let's finish off the surviving lizards!"
        [/message]
    [/event] 
    [event]
    name=villages_left
        [message]
            speaker=Landar 
            message= _ "The lizards are dead. Now let's capture the remaining villages!"
        [/message]
    [/event]

    [event]
        name=capture
        first_time_only=no
        [filter]
            side=1,2
        [/filter]
       
        [if]
            [not]
                [have_location]
                    terrain=*^V*
                    [not]
                        owner_side=1,2
                    [/not]
                [/have_location]
            [/not]
        [and]
            [have_unit]
                side=3,4,5
            [/have_unit]
        [/and]
        [then]
            [fire_event]
                name=saurians_left 
            [/fire_event]
        [/then]
        [else]
        [/else]
        [/if]
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            side=3,4,5
        [/filter]
        [if]
            [not]
                [have_unit]
                    side=3,4,5
                [/have_unit]
            [/not]
            [and]
                [have_location]
                    terrain=*^V*

                    [not]
                        owner_side=1,2
                    [/not]
                [/have_location]
            [/and]
        [then]
            [fire_event]
                name=villages_left 
            [/fire_event]
        [/then]
        [else]
        [/else]
        [/if]
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            side=3,4,5
        [/filter]
        [if]
            [not]
                [have_unit]
                    side=3,4,5
                [/have_unit]
            [/not]
            [and]
                [not]
                    [have_location]
                        terrain=*^V*

                        [not]
                            owner_side=1,2
                        [/not]
                    [/have_location]
                [/not]
            [/and]
        [then]
            [endlevel]
                result=victory 
                bonus=yes 
                carryover_percentage=40 
            [/endlevel]
        [/then]
        [else]
        [/else]
        [/if]
    [/event]

    [event]
        name=capture
        first_time_only=no
        [filter]
            side=1,2
        [/filter]
       
        [if]
            [not]
                [have_location]
                    terrain=*^V*
                    [not]
                        owner_side=1,2
                    [/not]
                [/have_location]
            [/not]
        [and]
            [not]
                [have_unit]
                    side=3,4,5
                [/have_unit]
            [/not]
        [/and]
        [then]
            [endlevel]
                result=victory 
                bonus=yes 
                carryover_percentage=40 
            [/endlevel]
        [/then]
        [else]
        [/else]
        [/if]
    [/event]

    [event]
        name=start

        [message]
            speaker=Galtrid
            message= _ "And here we are at the walls of Saurgrath, their capital. Do not forget — these beasts ruined Lord Erlornas!"
        [/message]
        [message]
            id=Landar
            message= _ "Now is our chance to finish them off..."
        [/message]
        [message]
            id=Kalenz
            message= _ "I fear this will be a bloodbath..."
        [/message]
        [message]
            id=Landar
            message= _ "Destroy them, root and branch. Burn out their homes. Let none remain alive!"
        [/message]

        [scroll_to_unit]
            id=Kalenz
        [/scroll_to_unit]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Kalenz is not able to recruit or recall shamans or any of their advancements in this scenario."
        [/message]
    [/event]

    [event]
        name=victory

        {REPLACE_SCENARIO_MUSIC sad.ogg}
        
        [message]
            id=Kalenz
            message= _ "That was the last. A bitter day’s work, and no memory to be proud of."
        [/message]
        [message]
            id=Landar
            message=_ "Our work isn't done yet. We'll raze their city to the ground so that nothing living remains here ever again!"
        [/message]
        [message]
            speaker=Kalenz
            message= _ "But all that was left here were eggs and hatchlings."
        [/message]
        [message]
            id=Landar
            message= _ "Do not spare them. They will only foul our forests anew when they get their growth."
        [/message]
        [message]
            speaker=Galtrid
            message= _ "But... to kill their young? Are we to go that far?"
        [/message]
        [message]
            id=Kalenz
            message= _ "Stay. You need not have the blood of children on your hands, and I shall not."
        [/message]
        [message]
            id=Landar
            message= _ "Perhaps you are too tender-minded to do what must be done, but many of us are not."
        [/message]
        [message]
            id=Kalenz
            message= _ "I will not set elf against elf. But, Landar, I fear you are storing up a dreadful price for yourself."
        [/message]

        [foreach]
            array=shamans
            index_var=i
            [do]
                [unstore_unit]
                    variable=this_item
                    x,y=recall,recall
                [/unstore_unit]
            [/do]
        [/foreach]
        [allow_recruit]
            side=1,2
            type=Elvish Shaman,Wose
        [/allow_recruit]

        [endlevel]
            result=victory 
            bonus=yes 
            carryover_percentage=40 
            music=silence.ogg
        [/endlevel]
    [/event]

    {~add-ons/Legacy_of_Wesmere/utils/deaths.cfg}
[/scenario]

#undef VICTORY_CONDITIONAL
